name: 功能建议 / Feature Request
description: 提出新功能或改进建议 / Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你想要的功能。
        Thanks for your suggestion! Please describe the feature you'd like.

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机 / Problem or Motivation
      description: 这个功能要解决什么问题？ / What problem does this feature solve?
      placeholder: "每次我想 ... 的时候，都需要 ... / Every time I want to ..., I have to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      description: 你希望怎么实现？ / How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 你考虑过的其他方案 / Any alternative solutions you've considered

  - type: dropdown
    id: scope
    attributes:
      label: 涉及模块 / Scope
      options:
        - 对话导入 / Import
        - LLM 摘要 / Summarization
        - 语义搜索 / Semantic Search
        - 知识图谱 / Knowledge Graph
        - 前端 UI / Frontend
        - 设置 / Settings
        - Electron 桌面应用 / Electron
        - 其他 / Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充说明 / Additional Context
      description: 截图、链接、参考项目等 / Screenshots, links, reference projects, etc.
