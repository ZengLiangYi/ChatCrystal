name: Build & Release

on:
  push:
    tags:
      - 'v*'           # Full release (npm + Electron)
      - 'npm-v*'       # npm only
      - 'electron-v*'  # Electron only
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Publish to npm'
        required: true
        type: boolean
        default: false
      npm_version:
        description: 'npm version override (leave empty to use server/package.json)'
        required: false
        type: string
      build_electron:
        description: 'Build Electron installer & GitHub Release'
        required: true
        type: boolean
        default: false
      electron_version:
        description: 'Electron version override (leave empty to use package.json)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine targets and versions
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == npm-v* ]]; then
              echo "DO_NPM=true" >> $GITHUB_ENV
              echo "DO_ELECTRON=false" >> $GITHUB_ENV
              echo "NPM_VERSION=${TAG#npm-v}" >> $GITHUB_ENV
            elif [[ "$TAG" == electron-v* ]]; then
              echo "DO_NPM=false" >> $GITHUB_ENV
              echo "DO_ELECTRON=true" >> $GITHUB_ENV
              echo "ELECTRON_VERSION=${TAG#electron-v}" >> $GITHUB_ENV
            else
              # v* tag: full release, read versions from respective package.json
              echo "DO_NPM=true" >> $GITHUB_ENV
              echo "DO_ELECTRON=true" >> $GITHUB_ENV
              echo "NPM_VERSION=$(node -p "require('./server/package.json').version")" >> $GITHUB_ENV
              echo "ELECTRON_VERSION=${TAG#v}" >> $GITHUB_ENV
            fi
          else
            # workflow_dispatch
            echo "DO_NPM=${{ inputs.publish_npm }}" >> $GITHUB_ENV
            echo "DO_ELECTRON=${{ inputs.build_electron }}" >> $GITHUB_ENV

            if [[ -n "${{ inputs.npm_version }}" ]]; then
              echo "NPM_VERSION=${{ inputs.npm_version }}" >> $GITHUB_ENV
            else
              echo "NPM_VERSION=$(node -p "require('./server/package.json').version")" >> $GITHUB_ENV
            fi

            if [[ -n "${{ inputs.electron_version }}" ]]; then
              echo "ELECTRON_VERSION=${{ inputs.electron_version }}" >> $GITHUB_ENV
            else
              echo "ELECTRON_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
            fi
          fi

      - name: Log resolved config
        shell: bash
        run: |
          echo "DO_NPM=$DO_NPM"
          echo "DO_ELECTRON=$DO_ELECTRON"
          echo "NPM_VERSION=$NPM_VERSION"
          echo "ELECTRON_VERSION=$ELECTRON_VERSION"

      - name: Build application
        run: |
          npm run build
          npx tsc -p electron/tsconfig.json

      # ── npm publish ──────────────────────────────────────────
      - name: Setup npm auth
        if: env.DO_NPM == 'true'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        if: env.DO_NPM == 'true'
        working-directory: server
        run: |
          npm version "${{ env.NPM_VERSION }}" --no-git-tag-version --allow-same-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Electron build + GitHub Release ──────────────────────
      - name: Sync Electron version
        if: env.DO_ELECTRON == 'true'
        shell: bash
        run: npm version "${{ env.ELECTRON_VERSION }}" --no-git-tag-version --allow-same-version

      - name: Package Electron app
        if: env.DO_ELECTRON == 'true'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: env.DO_ELECTRON == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: electron-v${{ env.ELECTRON_VERSION }}
          name: ChatCrystal v${{ env.ELECTRON_VERSION }}
          draft: false
          prerelease: ${{ contains(env.ELECTRON_VERSION, '-') }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.yml
            release/*.yaml
